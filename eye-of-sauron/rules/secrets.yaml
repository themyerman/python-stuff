    ".py": {
      "specific": {},
      "general": {
        "high": [
          {
            "id": "HARDCODED_PASSWORD",
            "pattern": "(?i)(password|passwd|pwd)\\s*[:=]\\s*['\\\"][^'\\\"]{6,}['\\\"]",
            "description": "Potential hardcoded password.",
            "remediation": "Move credentials to secret manager or environment variables.",
            "fix_recipe": "Replace literal secrets with env vars or secret manager lookup at runtime.",
            "safe_replacement": "password = os.getenv(\"APP_DB_PASSWORD\")",
            "test_policy": "allow-in-tests-with-justification",
            "autofix": "review",
            "tags": [
              "secrets",
              "auth"
            ],
            "cwe": "CWE-798",
            "confidence": "medium"
          },
          {
            "id": "PRIVATE_KEY_MATERIAL",
            "pattern": "-----BEGIN (RSA|EC|OPENSSH|DSA)? ?PRIVATE KEY-----",
            "description": "Private key material in source file.",
            "remediation": "Remove key from source control and rotate compromised key.",
            "fix_recipe": "Delete committed private key material, rotate keys, and load keys securely at runtime.",
            "safe_replacement": "private_key = load_key_from_kms()",
            "test_policy": "flag-in-tests-and-prod",
            "autofix": "manual",
            "tags": [
              "secrets",
              "crypto"
            ],
            "cwe": "CWE-321",
            "confidence": "high"
          },
          {
            "id": "GENERIC_API_KEY",
            "pattern": "(?i)(api[_-]?key|secret[_-]?key|access[_-]?token)\\s*[:=]\\s*['\\\"][A-Za-z0-9_\\-]{16,}['\\\"]",
            "description": "Potential hardcoded API token/key.",
            "remediation": "Use runtime secret injection.",
            "fix_recipe": "Inject credentials via environment/secrets manager and remove hardcoded value.",
            "safe_replacement": "api_key = os.getenv(\"OPENAI_API_KEY\")",
            "test_policy": "allow-in-tests-with-justification",
            "autofix": "review",
            "tags": [
              "secrets"
            ],
            "cwe": "CWE-798",
            "confidence": "medium"
          }
        ],
        "medium": [],
        "low": []
      }
    },
