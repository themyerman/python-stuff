name: Daily Writing Spark

on:
  workflow_dispatch:
    inputs:
      genre:
        description: "Single genre (sf/fantasy/western/mystery), or leave blank for all"
        type: string
        default: ""

permissions:
  contents: write
  models: read

jobs:
  spark:
    name: Generate & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: pip install .

      - name: Generate spark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GENRE_FLAG=""
          if [ -n "${{ inputs.genre }}" ]; then
            GENRE_FLAG="--genre ${{ inputs.genre }}"
          fi
          daily-spark $GENRE_FLAG --output docs/index.html

      - name: Commit and push
        run: |
          git config user.name "Daily Spark Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "spark: $(date -u '+%Y-%m-%d')"
          git push
