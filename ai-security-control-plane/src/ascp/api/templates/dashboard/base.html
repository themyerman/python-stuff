<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}ASCP{% endblock %} · Dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      font-size: 15px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    header strong { font-size: 1.1rem; letter-spacing: -0.02em; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a { color: var(--muted); }
    nav a:hover { color: var(--accent); }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 1rem; }
    h2 { font-size: 1.1rem; font-weight: 600; color: var(--muted); margin: 1.5rem 0 0.75rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .pill-ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
    .pill-warn { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
    .pill-bad { background: rgba(248, 81, 73, 0.15); color: var(--bad); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 13px;
    }
    .empty { color: var(--muted); padding: 1rem 0; }
    ul.tenants { list-style: none; padding: 0; margin: 0; }
    ul.tenants li { margin-bottom: 0.5rem; }
    ul.tenants a { font-weight: 500; }
    .page-intro, .section-intro {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 52rem;
    }
    .page-intro { margin: 0 0 1.25rem; }
    .section-intro { margin: -0.25rem 0 0.6rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <strong>ASCP</strong>
    <nav>
      <a href="/dashboard">Tenants</a>
      <a href="/docs" target="_blank" rel="noopener">API docs</a>
      <a href="/redoc" target="_blank" rel="noopener">ReDoc</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
