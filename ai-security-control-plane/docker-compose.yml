services:
  ascp:
    build: .
    ports:
      - "8000:8000"
    environment:
      ASCP_DATABASE_URL: sqlite:////data/ascp.db
      ASCP_ARTIFACT_ROOT: /data/artifacts
      # ASCP_UPSTREAM_BASE_URL: https://api.openai.com/v1
      # ASCP_UPSTREAM_API_KEY: ${OPENAI_API_KEY}
      # ASCP_API_KEY: ${ASCP_API_KEY}
      ASCP_LOG_LEVEL: INFO
    volumes:
      - ascp-data:/data

  ascp-postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ascp
      POSTGRES_PASSWORD: ascp
      POSTGRES_DB: ascp
    volumes:
      - pg-data:/var/lib/postgresql/data

  ascp-api-pg:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      ASCP_DATABASE_URL: postgresql://ascp:ascp@ascp-postgres:5432/ascp
      ASCP_ARTIFACT_ROOT: /data/artifacts
    volumes:
      - ascp-pg-artifacts:/data/artifacts
    depends_on:
      - ascp-postgres

volumes:
  ascp-data:
  pg-data:
  ascp-pg-artifacts:
