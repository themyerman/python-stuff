# ASCP developer journey on pull requests: upload lockfiles + assurance (fail_ci).
#
# Setup:
#   1. Copy this file to your app repo: .github/workflows/ascp-pr.yml
#   2. Add secrets: ASCP_BASE_URL, ASCP_TOKEN, ASCP_TENANT_ID, ASCP_ASSURANCE_TARGET_URL
#   3. Set repository variable ASCP_CI_ENABLED=true to turn the job on
#
# ASCP_TOKEN = admin API key OR tenant ascp_ten_... (path tenant must match ASCP_TENANT_ID).
# Staging URL must accept OpenAI-style POST JSON { "model", "messages" } (see ASCP assurance runner).

name: ASCP developer checks

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ascp-pr:
    if: vars.ASCP_CI_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload dependency lockfiles to ASCP
        env:
          ASCP_BASE_URL: ${{ secrets.ASCP_BASE_URL }}
          ASCP_TOKEN: ${{ secrets.ASCP_TOKEN }}
          ASCP_TENANT_ID: ${{ secrets.ASCP_TENANT_ID }}
        run: |
          set -euo pipefail
          BASE="${ASCP_BASE_URL%/}"
          TEN="$ASCP_TENANT_ID"
          upload() {
            local f="$1"
            [ -f "$f" ] || return 0
            echo "Uploading $f ..."
            curl -fsS -X POST \
              "${BASE}/v1/tenants/${TEN}/supply-chain/lockfile?filename=${f}" \
              -H "Authorization: Bearer ${ASCP_TOKEN}" \
              --data-binary "@${f}"
          }
          upload requirements.txt
          upload Pipfile.lock
          upload poetry.lock
          upload package-lock.json
          upload pnpm-lock.yaml
          upload yarn.lock
          echo "Supply step done."

      - name: Assurance run (blocks merge if below min_pass_rate)
        env:
          ASCP_BASE_URL: ${{ secrets.ASCP_BASE_URL }}
          ASCP_TOKEN: ${{ secrets.ASCP_TOKEN }}
          ASCP_TENANT_ID: ${{ secrets.ASCP_TENANT_ID }}
          ASCP_ASSURANCE_TARGET_URL: ${{ secrets.ASCP_ASSURANCE_TARGET_URL }}
        run: |
          set -euo pipefail
          BASE="${ASCP_BASE_URL%/}"
          TEN="$ASCP_TENANT_ID"
          MP="${{ vars.ASCP_MIN_PASS_RATE }}"
          MP="${MP:-0.7}"
          BODY=$(jq -n \
            --arg url "$ASCP_ASSURANCE_TARGET_URL" \
            --argjson mp "$MP" \
            '{suite:"builtin-v0",metadata:{target_url:$url,min_pass_rate:$mp}}')
          RID=$(curl -fsS -X POST "${BASE}/v1/tenants/${TEN}/assurance-runs" \
            -H "Authorization: Bearer ${ASCP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" | jq -r .run_id)
          echo "Run ID: $RID"
          curl -fsS -X POST \
            "${BASE}/v1/tenants/${TEN}/assurance-runs/${RID}/execute?fail_ci=true" \
            -H "Authorization: Bearer ${ASCP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "Assurance passed CI threshold."
