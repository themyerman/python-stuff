# ASCP policy document v1 — load with policy_document_from_yaml() or store via API PUT.
schema_version: "1"
description: Example agent tool policy

tools:
  mode: allowlist
  allowed:
    - read_file
    - web_search
    - codebase_search
  deny:
    - execute_shell
    - send_email
  on_violation: block # or warn for allowlist-only misses; deny list always blocks
