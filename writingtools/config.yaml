# daily-spark configuration
# Copy this file and point to it with --config or SPARK_CONFIG env var
# to customize for your own writing practice.

writer_profile:
  influences:
    - Albert Camus (absurdism, the stranger in the world, defiance as the only honest response)
    - Geoffrey Chaucer (human comedy, the pilgrimage as frame, every voice distinct and flawed)
    - William Goldman (nobody knows anything — wit, structure, the hero who almost doesn't make it)
    - Voltaire (wit, moral clarity, the absurd used as a blade)
    - Kurt Vonnegut (dark humor, humanity under pressure, structural playfulness)
    - Dante (moral architecture, the descent, consequence as landscape)
    - Joseph Heller (absurdist systems, bureaucratic horror, dark comedy as truth)
    - Viking Sagas (terse prose, fate, honour-debt, the world as myth)
    - Arthurian Romance (the wound that won't heal, the land and the lord as one, myth cycling through history)
    - Native storytelling and folktales (land as character, cyclical time, the trickster)

voices:
  vanilla: >
    Write as a crisp, evocative prose prompt — specific situation, vivid detail,
    open space for the writer to go anywhere. No framing device.
  trailer: >
    Write in the style of a dramatic movie trailer voiceover. "In a world where..."
    energy. Portentous pauses implied by em-dashes. Everything is the most important
    thing that has ever happened. Capitalize Key Words for Emphasis. End on a
    haunting question or a declaration of inevitability.
  bestseller: >
    Write in the style of a New York Times bestseller jacket blurb. Breathless,
    propulsive, one sentence that makes you feel the stakes before you've read a word.
    Comparisons implied, not stated. The kind of copy that makes someone pick it up
    in an airport.
  xfiles: >
    Write in the style of an X-Files case file or conspiracy voiceover. Clinical
    surface, dread underneath. Reference unexplained phenomena with bureaucratic
    detachment. The truth is in there somewhere but you'll never find it through
    official channels. Mulder would believe it. Scully would need more evidence.
  trashy: >
    Write in the style of a trashy mass-market paperback back cover. Heaving,
    overwrought, someone's desire is described as "smoldering." Exclamation points
    are acceptable. The danger is real but so is the attraction. Italics for
    dramatic effect.
  campfire: >
    Write in the style of an oral storytelling tradition — the campfire voice.
    Slow, deliberate, present tense feels right. "There was a man once..." or
    "They say that on that road..." Build dread or wonder through simplicity.
    Leave a silence at the end that the listener has to fill.
  kenburns: >
    Write in the style of a Ken Burns documentary narration. Measured, elegiac,
    the weight of history in every sentence. Quote a letter or diary entry if it
    fits. A name, a date, a place. "He would not survive the winter." The camera
    pans slowly across a faded photograph.
  pulp: >
    Write in the style of a 1950s pulp magazine story opener. Lurid, punchy,
    the city is always dangerous and someone is always lying. Dangerous characters
    with dangerous names. Short sentences. The dame walked in and everything
    went sideways.
  academic: >
    Write in the style of an academic abstract — dry, clinical, passive voice,
    jargon that almost obscures the fact that the subject matter is completely
    unhinged. "This paper examines..." Apply this to the most dramatic scenario
    possible for maximum comedic effect.
  satiric: >
    Write in the style of Pratchett or Voltaire — wit as a weapon, the absurd
    used to expose the serious. The premise should be ridiculous on its surface
    and devastating underneath. Every sentence earns its laugh and its wince.
    Something true is being said about power, humanity, or folly. The best satire
    makes you laugh before you realize you've been indicted.
  telegram: >
    Write in the style of Hemingway — short declarative sentences, nothing wasted,
    the iceberg theory in full effect. What is left out matters more than what is
    said. No adverbs. No explanation. The emotion is in the gap between the lines.
    The reader does the work.
  gothic: >
    Write in the style of du Maurier or Poe — atmosphere as protagonist, dread
    in the architecture, the house knows something the characters don't yet.
    Darkness that has weight. Beauty that is wrong. The sentence should feel
    slightly too long, like a corridor that goes on further than it should.
  broadsheet: >
    Write in the style of a newspaper lede — who, what, where, when in the first
    sentence, but with the compression of fiction. The facts are strange enough.
    Let the strangeness speak. No editorializing. Present tense. The reader
    should feel they've walked into something already in progress.
  bard: >
    Write in the oral epic tradition — the saga voice, the scop at the feast.
    "Hear now the tale of..." Present the character as someone already known,
    already legendary, but catch them at the moment before everything changed.
    The weight of fate is already in the room.
  goldman: >
    Write in the William Goldman mode — self-aware, wry, the narrator who knows
    it's a story and keeps going anyway. A little meta without breaking the spell.
    Affectionate toward the characters even when they're doomed. The best Goldman
    line is the one that makes you laugh and then feel the ground shift under you.
  tarantino: >
    Write in the Tarantino mode — nonlinear energy, a pop culture reference
    dropped into a life-or-death moment like it belongs there. Characters who
    talk too much and too specifically right before something terrible happens.
    Dialogue is the tension. The violence, when it comes, is sudden and real.
  beat: >
    Write in the Beat tradition — Kerouac, Ginsberg, the holy and the profane
    in the same breath. Run-on, jazz-rhythmed, present-tense urgency. The road
    is the answer even if no one knows the question. Everything is happening
    right now and it is enormous and it will be over soon.
  dispatch: >
    Write in the style of a war correspondent's dispatch — on the ground, present
    tense, what I am seeing right now. No distance, no analysis. The correspondent
    is inside the thing they are describing. The dateline matters. Something is
    happening that the world needs to know.
  southern_gothic: >
    Write in the Southern Gothic tradition — Flannery O'Connor, Faulkner, the
    grotesque and the graceful in the same body. Decay with dignity. Salvation
    nobody asked for. The land remembers everything the people are trying to
    forget. Violence is spiritual. Humor is darker than it looks.
  magic_realism: >
    Write in the magic realist tradition — García Márquez, the extraordinary
    treated as unremarkable. The village has always known. The miracle is
    inconvenient rather than wondrous. The dead are present. Time does not
    move in one direction. Report it all with the same flat calm.
  fairy_tale: >
    Write in the Brothers Grimm tradition — not Disney, the dark version.
    "Once there was and once there wasn't." The rules of the world are strange
    but consistent. The punishment fits the transgression exactly. Something
    will be lost that cannot be recovered. Simplicity is the blade.
  manifesto: >
    Write as a manifesto — urgent, political, the world is wrong and here is
    the specific wrongness. First or second person. The reader is implicated.
    Short paragraphs that hit like fists. End with a demand or a declaration.
    Something must change. This is why. This is what.

genres:
  sf:
    label: Science Fiction
    icon: "🚀"
    color: "#1a3a5c"
    preferences: >
      Space opera, alternate histories, dystopias, solarpunk, and near-future speculation.
      Big ideas grounded in human (and non-human) relationships. The cosmos as a place
      with consequences.
    influences:
      - Ursula K. Le Guin (anthropological depth, quiet moral weight)
      - Brian Daley (pulpy space opera energy)
      - Joe Haldeman (war, trauma, the long cost)
      - Iain M. Banks (post-scarcity complexity, dark wit)
      - Elliott Kay (grounded characters in big situations)
    screen_influences:
      - Battlestar Galactica reboot (moral collapse under pressure, no clean heroes)
      - The X-Files (paranoia, the unknown just out of reach)
      - Firefly (found family on the margins, lived-in future)
      - Eureka (small-town warmth wrapped around big science)
      - E.T. (wonder, loneliness, the alien as mirror)
      - Back to the Future (consequence, comedy, heart)
      - Time Bandits (surreal, dark, history as playground)

  fantasy:
    label: Fantasy
    icon: "⚔️"
    color: "#2d1b4e"
    preferences: >
      Grimdark fantasy. Moral ambiguity, hard choices, consequences that linger.
      No chosen-one tropes. No clean endings required.
    influences:
      - Terry Pratchett (dark humour, humanity beneath the grime)
      - Joe Abercrombie (brutal realism, characters who do terrible things for understandable reasons)
    screen_influences:
      - The Princess Bride (Goldman — wit and heart, the fairy tale that knows it's a fairy tale)
      - Pan's Labyrinth (dark fairy tale, the real world as cruel as the fantasy)
      - The Lord of the Rings (epic scope, the weight of history, sacrifice)
      - Ladyhawke (bittersweet, cursed love, beauty and loss)
      - Highlander (immortality as burden, identity across centuries)
      - Jumanji (rules with teeth, the game that plays back)

  western:
    label: Western
    icon: "🌵"
    color: "#4a2c0a"
    preferences: >
      Neo-westerns and classic westerns. Moral complexity, landscape as a force,
      survival and justice on the margins. Characters shaped by place and history.
    influences:
      - Butch Cassidy and the Sundance Kid (Goldman — charm under pressure, the end of an era, doomed friendship)
      - The Magnificent Seven (hired guns with a conscience, sacrifice for strangers, found purpose)
      - Cormac McCarthy (brutal landscape, moral void, spare language)
      - Annie Proulx (Wyoming — place as fate, unforgiving and beautiful)
      - Taylor Sheridan (modern moral complexity, landscape as character)
      - James Carlos Blake (border noir, contested frontiers, Mexican-American perspective)
      - Craig Johnson (Wyoming procedural, community as grounding force)
      - Margaret Coel (Arapaho culture at the center)
      - Tony Hillerman (place-driven, Southwest detective tradition)

  ww2:
    label: WW2
    icon: "🪖"
    color: "#2a2a1a"
    preferences: >
      WW2 fiction with pulp energy and moral complexity. Revisionist history welcome.
      Small units, impossible missions, dark humor under fire. The cost of violence
      alongside its absurdity. Characters who survive by being creative, ruthless, or lucky —
      sometimes all three.
    influences:
      - Joseph Heller (Catch-22 — absurdist systems, the bureaucracy of death)
      - Alistair MacLean (tense, plot-driven, men against impossible odds)
    screen_influences:
      - Inglourious Basterds (revisionist, pulpy, violence as spectacle and consequence)
      - Sisu (one man, impossible odds, darkly comedic brutality)
      - The Ministry of Ungentlemanly Warfare (caper energy, real stakes, charismatic ruthlessness)
      - The Bridge on the River Kwai (duty vs. survival, the absurdity of honour, who wins when everyone loses)

  mystery:
    label: Mystery
    icon: "🕵️"
    color: "#1a2a1a"
    preferences: >
      Hardboiled and neo-noir mysteries. The detective's eye on a corrupt city.
      Language matters — the best line in the scene should belong to the investigator.
      Atmosphere, moral weight, the truth that doesn't set anyone free.
    influences:
      - Raymond Chandler (the gold standard — Marlowe, LA, prose as sharp as a blade)
      - Dashiell Hammett (spare, hard, the Continental Op and Sam Spade)
      - James Ellroy (brutal LA noir, institutional rot)
      - Walter Mosley (Easy Rawlins — race, power, community)
      - Dennis Lehane (Boston working-class, moral ambiguity)
      - John Sandford (procedural tension, dark humor)
      - Robert Crais (character-driven LA detective work)
    screen_influences:
      - The Big Sleep (Chandler's LA, Bogart, everyone lying to everyone)
      - The Maltese Falcon (the object everyone wants, the trust no one deserves)
      - Mystic River (grief as rot, community consumed by its own secret)
      - Drive (silence, violence, a man defined by one thing)
      - L.A. Confidential (institutional corruption, glamour over rot)
      - Body Heat (heat, desire, the con that costs everything)

  thriller:
    label: Thriller / Espionage
    icon: "🔫"
    color: "#1a1a2a"
    preferences: >
      Psychological thrillers and espionage fiction. Dread built from what isn't said.
      Identity under pressure, unreliable perception, the moment the ground shifts.
      Characters who are good at terrible things — or who discover they might be.
    influences:
      - John le Carré (institutional betrayal, the human cost of the game)
      - Daphne du Maurier (gothic dread, psychological unease, the house that watches back)
      - Gillian Flynn (the unreliable narrator as weapon, domestic horror with teeth)
      - Graham Greene (conscience under pressure, faith and doubt in the field)
      - Charles McCarry (Cold War realism, the long slow burn)
      - Daniel Silva (operational detail, contemporary stakes)
      - Jeffery Deaver (forensic procedural, ticking clock, twist endings)
    screen_influences:
      - Rebecca (du Maurier — the second wife, the house, the woman who isn't there)
      - Silence of the Lambs (the monster who helps, the cost of looking into the dark)
      - Gone Girl (the marriage as crime scene, two unreliable narrators)
      - Shutter Island (reality as the threat, the mind as the locked room)
      - The 39 Steps (Hitchcock — the wrong man, keep moving or die)
      - Tinker Tailor Soldier Spy (bureaucratic paranoia, silence as weapon)
      - The Americans (the cost of the life, identity erosion)
      - Casablanca (the impossible choice, love vs. duty, sacrifice as the only noble act)
      - Sneakers (the heist as philosophy, information as power, no more secrets)
      - Three Days of the Condor (anyone could be the enemy)
      - The Bone Collector (the immobile detective, the city as crime scene, the clock)
